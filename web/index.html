<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Capivara Companheira</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #111111;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
      }

      /*
        Simula a tela de um celular (390×844 — proporção iPhone 14).
        Em telas menores que 844px de altura, reduz para caber na janela.
      */
      #root {
        position: relative !important;
        width: 390px !important;
        height: min(844px, calc(100vh - 32px)) !important;
        overflow: hidden !important;
        border-radius: 44px;
        /*
          transform cria um novo contexto de posicionamento — faz com que
          os elementos position:fixed internos do React Native Web se ancorem
          neste container em vez da viewport do browser.
        */
        transform: translate(0, 0);
        box-shadow:
          0 0 0 2px #555,
          0 0 0 10px #222,
          0 0 0 12px #111,
          0 30px 100px rgba(0, 0, 0, 0.8);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
